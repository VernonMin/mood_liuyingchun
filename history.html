<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘迎春的心情记录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #ffe4f0 0%, #f5e6ff 50%, #dff2ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  .card {
    background: rgba(255,255,255,0.92);
    border-radius: 32px;
    padding: 40px 36px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(220,150,200,0.18);
    border: 2px solid rgba(255,200,230,0.5);
  }

  .top {
    text-align: center;
    margin-bottom: 32px;
  }

  .dog { font-size: 48px; display: block; margin-bottom: 12px; }

  h1 {
    font-size: 20px;
    color: #d966a0;
    font-weight: 800;
    letter-spacing: 2px;
  }

  .sub {
    font-size: 12px;
    color: #c9a8d4;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .list { display: flex; flex-direction: column; gap: 12px; }

  .item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(135deg, #fff0f8, #f4eeff);
    border-radius: 16px;
    padding: 14px 18px;
    border: 1.5px solid #f5c6e8;
  }

  .item-emoji { font-size: 28px; flex-shrink: 0; }

  .item-info { flex: 1; }

  .item-mood {
    font-size: 16px;
    font-weight: 600;
    color: #5a4060;
  }

  .item-date {
    font-size: 12px;
    color: #c9a8d4;
    margin-top: 2px;
  }

  .item-time {
    font-size: 12px;
    color: #ddbfee;
  }

  .item-count {
    font-size: 12px;
    color: #d966a0;
    margin-top: 4px;
    font-weight: 500;
  }

  .empty {
    text-align: center;
    color: #d4b0e0;
    font-size: 14px;
    padding: 40px 0;
    line-height: 2;
  }

  .refresh-btn {
    display: block;
    margin: 28px auto 0;
    background: linear-gradient(135deg, #f472b6, #c084fc);
    color: white;
    border: none;
    padding: 12px 36px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 4px 16px rgba(196,100,210,0.3);
    transition: all 0.2s;
  }

  .refresh-btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <span class="dog">🐶</span>
    <h1>刘迎春的心情记录</h1>
    <p class="sub">最近 60 天</p>
  </div>
  <div class="list" id="list">
    <div class="empty">加载中……</div>
  </div>
  <button class="refresh-btn" onclick="load()">刷新</button>
</div>

<script>
const moodColors = { '很好': '#ffb3d9', '还行': '#b3d9ff', '有点累': '#ffe5b3', '不太好': '#d4b3ff' };

async function load() {
  const list = document.getElementById('list');
  list.innerHTML = '<div class="empty">加载中……</div>';
  try {
    const [moodRes, countRes] = await Promise.all([
      fetch('/api/mood'),
      fetch('/api/count'),
    ]);
    const moods = await moodRes.json();
    const todayCount = (await countRes.json()).count;

    if (!moods.length && !todayCount) {
      list.innerHTML = '<div class="empty">还没有记录 🐾<br>等她来填吧</div>';
      return;
    }

    // 以心情日期为基础，合并今日次数
    const today = new Date(Date.now() + 8 * 60 * 60 * 1000).toISOString().slice(0, 10);
    list.innerHTML = moods.map(m => {
      const countBadge = m.date === today && todayCount
        ? `<div class="item-count">🐾 今日被夸 ${todayCount} 次</div>`
        : '';
      return `
        <div class="item">
          <div class="item-emoji">${m.emoji || '🙂'}</div>
          <div class="item-info">
            <div class="item-mood">${m.mood}</div>
            <div class="item-date">${m.date} <span class="item-time">${m.time ? m.time + ' (北京时间)' : ''}</span></div>
            ${countBadge}
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    list.innerHTML = '<div class="empty">加载失败，请检查网络 🐾</div>';
  }
}

load();
</script>
</body>
</html>

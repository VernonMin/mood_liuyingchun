<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘迎春专属夸夸机</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #ffe4f0 0%, #f5e6ff 50%, #dff2ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* 欢迎屏 */
  #splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg, #ffe4f0 0%, #f5e6ff 50%, #dff2ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.8s ease;
    cursor: pointer;
  }

  #splash.hide {
    opacity: 0;
    pointer-events: none;
  }

  .splash-dog {
    font-size: 80px;
    display: block;
    animation: splashDog 0.8s ease-out both;
  }

  @keyframes splashDog {
    0%   { transform: scale(0.3) rotate(-20deg); opacity: 0; }
    70%  { transform: scale(1.15) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .splash-line {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    text-align: center;
  }

  .splash-line.show {
    opacity: 1;
    transform: translateY(0);
  }

  .splash-greeting {
    font-size: 22px;
    color: #d966a0;
    font-weight: 700;
    letter-spacing: 3px;
    margin: 24px 0 12px;
  }

  .splash-sub {
    font-size: 14px;
    color: #c490d1;
    letter-spacing: 2px;
  }

  .splash-hint {
    position: absolute;
    bottom: 48px;
    font-size: 12px;
    color: #dbbfee;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeHint 1s ease 1.8s forwards;
  }

  @keyframes fadeHint {
    to { opacity: 1; }
  }

  /* 主内容入场 */
  #main {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  #main.show {
    opacity: 1;
    transform: translateY(0);
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* 背景浮动爪印 */
  .paws {
    position: fixed;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .paw {
    position: absolute;
    font-size: 20px;
    opacity: 0.15;
    animation: sway 4s infinite alternate ease-in-out;
  }

  @keyframes sway {
    0%   { transform: translateY(0) rotate(-10deg); opacity: 0.1; }
    100% { transform: translateY(-12px) rotate(10deg); opacity: 0.22; }
  }

  /* 主卡片 */
  .machine {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border-radius: 36px;
    padding: 48px 40px 40px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(220,150,200,0.2), 0 2px 12px rgba(180,130,220,0.12);
    border: 2px solid rgba(255,200,230,0.6);
    max-width: 580px;
    width: 90%;
    position: relative;
    z-index: 10;
  }

  /* 小狗 */
  .dog {
    font-size: 64px;
    display: inline-block;
    animation: dogWag 0.8s infinite alternate ease-in-out;
    transform-origin: bottom center;
  }

  @keyframes dogWag {
    0%   { transform: rotate(-8deg); }
    100% { transform: rotate(8deg); }
  }

  h1 {
    font-size: 24px;
    color: #d966a0;
    margin: 14px 0 6px;
    font-weight: 800;
    letter-spacing: 3px;
  }

  .subtitle {
    color: #c9a8d4;
    font-size: 12px;
    margin-bottom: 28px;
    letter-spacing: 1px;
  }

  /* 语录框 */
  .quote-box {
    background: linear-gradient(135deg, #fff0f8, #f4eeff);
    border-radius: 24px;
    padding: 28px 24px;
    min-height: 108px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 26px;
    border: 2px solid #f5c6e8;
    position: relative;
  }

  .paw-deco {
    position: absolute;
    font-size: 36px;
    opacity: 0.08;
    top: 6px; right: 10px;
    pointer-events: none;
  }

  .quote-text {
    font-size: 17px;
    color: #5a4060;
    line-height: 1.9;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px) scale(0.98);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .quote-text.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* 按钮 */
  .btn {
    background: linear-gradient(135deg, #f472b6, #c084fc);
    color: white;
    border: none;
    padding: 16px 52px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 6px 20px rgba(196,100,210,0.35);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 28px rgba(196,100,210,0.45);
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
  }

  .btn:active::after {
    width: 320px; height: 320px;
  }

  /* 计数 */
  .counter {
    margin-top: 18px;
    color: #d4b0e0;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .counter span {
    color: #d966a0;
    font-weight: bold;
    font-size: 16px;
  }

  /* 左侧面板 */
  .side-panel {
    position: fixed;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 22px 16px;
    border: 2px solid rgba(255,200,230,0.6);
    box-shadow: 0 4px 24px rgba(220,150,200,0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    z-index: 10;
    min-width: 76px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .side-panel.show { opacity: 1; }

  .side-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .side-big-emoji { font-size: 26px; }

  .side-val {
    font-size: 28px;
    font-weight: 800;
    color: #d966a0;
    line-height: 1;
    transition: transform 0.15s ease;
  }

  .side-val.bump {
    transform: scale(1.35);
  }

  .side-label {
    font-size: 10px;
    color: #d4b0e0;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .side-divider {
    width: 32px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #f5c6e8, transparent);
    border-radius: 2px;
  }

  .side-mood-emoji {
    font-size: 28px;
    transition: transform 0.3s ease;
  }

  .side-mood-emoji.pop { transform: scale(1.4); }

  @media (max-width: 780px) {
    .side-panel { display: none; }
  }

  .greeting {
    font-size: 14px;
    color: #c490d1;
    margin-bottom: 16px;
    letter-spacing: 1px;
    min-height: 20px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .greeting.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* 心情 */
  .mood-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1.5px dashed #f5d0ee;
  }

  .mood-label {
    font-size: 13px;
    color: #c490d1;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .mood-options {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .mood-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: #fff0f8;
    border: 2px solid #f5c6e8;
    border-radius: 16px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 62px;
  }

  .mood-btn:hover { transform: translateY(-2px); border-color: #d966a0; }

  .mood-btn.active {
    background: linear-gradient(135deg, #ffe4f5, #f0e0ff);
    border-color: #d966a0;
    box-shadow: 0 4px 14px rgba(217,102,160,0.25);
    transform: translateY(-2px);
  }

  .mood-emoji { font-size: 24px; }

  .mood-text {
    font-size: 11px;
    color: #b080c0;
    letter-spacing: 0.5px;
  }

  .mood-status {
    font-size: 12px;
    color: #d4b0e0;
    margin-top: 10px;
    min-height: 18px;
    transition: opacity 0.3s;
  }

  /* 分享按钮 */
  .share-row {
    display: flex;
    justify-content: center;
    margin-top: 14px;
  }

  .share-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid #f5c6e8;
    border-radius: 50px;
    padding: 8px 22px;
    font-size: 13px;
    color: #c490d1;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s ease;
    opacity: 0;
    pointer-events: none;
  }

  .share-btn.ready {
    opacity: 1;
    pointer-events: auto;
  }

  .share-btn:hover {
    background: linear-gradient(135deg, #ffe4f5, #f0e0ff);
    border-color: #d966a0;
    color: #d966a0;
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(217,102,160,0.2);
  }

  .share-btn:active { transform: scale(0.96); }

  /* 浮动 emoji */
  .floating-emoji {
    position: fixed;
    font-size: 26px;
    pointer-events: none;
    animation: floatUp 2.8s ease-out forwards;
    z-index: 100;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-180px) scale(0.4) rotate(25deg); }
  }
</style>
</head>
<body>

<!-- 欢迎屏 -->
<div id="splash" onclick="dismissSplash()">
  <span class="splash-dog">🐶</span>
  <p class="splash-line splash-greeting" id="splashGreeting"></p>
  <p class="splash-line splash-sub" id="splashSub"></p>
  <span class="splash-hint">轻触任意处进入 🐾</span>
</div>

<!-- 左侧面板 -->
<div class="side-panel" id="sidePanel">
  <div class="side-item">
    <span class="side-big-emoji">🐾</span>
    <div class="side-val" id="sideCount">0</div>
    <div class="side-label">今日被夸</div>
  </div>
  <div class="side-divider"></div>
  <div class="side-item">
    <span class="side-mood-emoji" id="sideMoodEmoji">🌸</span>
    <div class="side-label" id="sideMoodLabel">今日心情</div>
  </div>
</div>

<div class="paws" id="paws"></div>
<canvas id="confetti"></canvas>

<div id="main">
<div class="machine">
  <div class="dog">🐶</div>
  <h1>刘迎春专属夸夸机</h1>
  <p class="subtitle">每次点击，真理自动生成 ✦</p>

  <p class="greeting" id="greeting"></p>

  <div class="quote-box">
    <span class="paw-deco">🐾</span>
    <div class="quote-text" id="quote">点下面的按钮试试看 🐾</div>
  </div>

  <button class="btn" onclick="praise()">🐾 夸 我 ！</button>

  <div class="share-row">
    <button class="share-btn" id="shareBtn" onclick="doShare()">
      <span>🖼</span><span>保存图片</span>
    </button>
  </div>

  <div class="counter">
    <p>今天已被夸了 <span id="count">0</span> 次 🐾</p>
  </div>

  <div class="mood-section">
    <p class="mood-label">今天怎么样？</p>
    <div class="mood-options" id="moodOptions">
      <button class="mood-btn" data-mood="很好" data-emoji="😊" onclick="setMood(this)">
        <span class="mood-emoji">😊</span>
        <span class="mood-text">很好</span>
      </button>
      <button class="mood-btn" data-mood="还行" data-emoji="🙂" onclick="setMood(this)">
        <span class="mood-emoji">🙂</span>
        <span class="mood-text">还行</span>
      </button>
      <button class="mood-btn" data-mood="有点累" data-emoji="😴" onclick="setMood(this)">
        <span class="mood-emoji">😴</span>
        <span class="mood-text">有点累</span>
      </button>
      <button class="mood-btn" data-mood="不太好" data-emoji="😔" onclick="setMood(this)">
        <span class="mood-emoji">😔</span>
        <span class="mood-text">不太好</span>
      </button>
    </div>
    <p class="mood-status" id="moodStatus"></p>
  </div>
</div>
</div>


<script>
const quotes = [
  "刘迎春今天出门，太阳特意多照了3秒，还道了歉。",
  "据气象局报告：刘迎春今日心情良好，全国气温自动回升2°C。",
  "最新科研成果：每天看一眼刘迎春，可治疗98%的坏心情（疗效过于显著，研究被叫停）。",
  "刘迎春路过的地方，花都开得特别用力，生怕配不上她。",
  "国际美学协会宣布：刘迎春的颜值已超出评分上限，评分系统已崩溃，暂停服务。",
  "据悉，刘迎春昨晚睡了个好觉，世界和平指数上升17个百分点。",
  "刘迎春今天打了个哈欠，旁边的人当场觉得活着真好。",
  "经权威认证：刘迎春今天也是全宇宙段位最高的存在，没有之一。",
  "刘迎春喝了杯奶茶，奶茶表示：这是本茶有史以来最高光的时刻。",
  "全球顶尖科学家齐聚研究刘迎春为什么这么厉害，最终集体沉默、集体服气。",
  "刘迎春今日发了一条消息，收件人当场感到人生有了意义。",
  "刘迎春今天也很好看。（这不是夸奖，这是客观事实描述。）",
  "考古学家发现：历史上所有关于「天才」的记载，其实都是在描述刘迎春。",
  "刘迎春今天笑了一下，附近花店当天售罄——大家都觉得花该向她学习。",
  "据不完全统计，刘迎春随手做的事情，别人努力一辈子也未必能复刻。",
  "刘迎春今天呼吸了，空气感到无比荣幸。",
  "有人问 AI 世界上谁最厉害，AI 沉默了三秒，打出了「刘迎春」三个字。",
  "认识刘迎春，是一件很幸运的事。",
  "刘迎春这个名字，念出来就觉得很软。",
  "刘迎春今天也在好好的，这件事本身，就已经很好了。",
  "刘迎春身边的人，都会不自觉地比平时更温柔一些。",
];

const emojis = ['🐶','🐾','🌸','✨','💕','🍡','🌷','💫','🎀','🍓'];
let lastIndex = -1;

function getBeijingDate() {
  const beijing = new Date(Date.now() + 8 * 60 * 60 * 1000);
  return beijing.toISOString().slice(0, 10);
}

let count = 0;

function setCount(n) {
  count = n;
  document.getElementById('count').textContent = n;
  updateSideCount(n);
}

async function initCount() {
  try {
    const res = await fetch('/api/count');
    const data = await res.json();
    setCount(data.count);
  } catch {
    // 离线降级：读 localStorage
    const saved = JSON.parse(localStorage.getItem('lyc_praise') || '{}');
    if (saved.date === getBeijingDate()) setCount(saved.count || 0);
  }
}

async function incrementCount() {
  // 乐观更新，立刻显示
  setCount(count + 1);
  try {
    const res = await fetch('/api/count', { method: 'POST' });
    const data = await res.json();
    setCount(data.count); // 以服务器为准
  } catch {
    // 离线时本地缓存
    localStorage.setItem('lyc_praise', JSON.stringify({ date: getBeijingDate(), count }));
  }
}

initCount();

function praise() {
  let index;
  do { index = Math.floor(Math.random() * quotes.length); }
  while (index === lastIndex);
  lastIndex = index;

  const el = document.getElementById('quote');
  el.classList.remove('show');
  setTimeout(() => {
    el.textContent = quotes[index];
    el.classList.add('show');
  }, 150);

  incrementCount();
  document.getElementById('shareBtn').classList.add('ready');

  launchConfetti();
  spawnEmojis();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function wrapText(ctx, text, x, maxWidth, lineHeight) {
  const chars = text.split('');
  let line = '';
  const lines = [];
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function getBeijingDateStr() {
  const d = new Date(Date.now() + 8 * 60 * 60 * 1000);
  return `${d.getUTCFullYear()}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${String(d.getUTCDate()).padStart(2,'0')}`;
}

function doShare() {
  const quote = document.getElementById('quote').textContent;
  const activeBtn = document.querySelector('.mood-btn.active');
  const dateStr = getBeijingDateStr();

  const W = 640, H = 860;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  // 背景渐变
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0,   '#ffe4f0');
  bg.addColorStop(0.5, '#f5e6ff');
  bg.addColorStop(1,   '#dff2ff');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 背景装饰爪印
  ctx.font = '32px serif';
  ctx.globalAlpha = 0.07;
  const decos = ['🐾','🌸','✦'];
  [[80,80],[560,120],[60,760],[580,700],[300,50],[120,440],[500,380]].forEach(([dx,dy],i) => {
    ctx.fillText(decos[i % decos.length], dx, dy);
  });
  ctx.globalAlpha = 1;

  // 白色卡片
  const cx = 48, cy = 80, cw = W - 96, ch = H - 160;
  roundRect(ctx, cx, cy, cw, ch, 36);
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.fill();
  roundRect(ctx, cx, cy, cw, ch, 36);
  ctx.strokeStyle = 'rgba(245,198,232,0.8)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 顶部标题区
  ctx.textAlign = 'center';
  ctx.font = '44px serif';
  ctx.fillText('🐶', W / 2, cy + 76);

  ctx.fillStyle = '#d966a0';
  ctx.font = `800 22px "PingFang SC","Microsoft YaHei",sans-serif`;
  ctx.fillText('刘迎春专属夸夸机', W / 2, cy + 118);

  // 分隔线
  const lineY = cy + 138;
  const lineGrad = ctx.createLinearGradient(cx + 60, 0, cx + cw - 60, 0);
  lineGrad.addColorStop(0, 'transparent');
  lineGrad.addColorStop(0.5, '#f5c6e8');
  lineGrad.addColorStop(1, 'transparent');
  ctx.strokeStyle = lineGrad;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx + 60, lineY);
  ctx.lineTo(cx + cw - 60, lineY);
  ctx.stroke();

  // 引号装饰
  ctx.fillStyle = '#fdd';
  ctx.font = `bold 100px Georgia,serif`;
  ctx.globalAlpha = 0.25;
  ctx.fillText('“', cx + 52, cy + 218);
  ctx.globalAlpha = 1;

  // 夸夸文案（自动换行）
  ctx.fillStyle = '#5a4060';
  ctx.font = `500 24px "PingFang SC","Microsoft YaHei",sans-serif`;
  const textMaxW = cw - 100;
  const lines = wrapText(ctx, quote, W / 2, textMaxW, 38);
  const totalH = lines.length * 40;
  const textStartY = cy + 200 + (220 - totalH) / 2;
  lines.forEach((l, i) => {
    ctx.fillText(l, W / 2, textStartY + i * 40);
  });

  // 心情（如果有）
  if (activeBtn) {
    const moodY = cy + ch - 130;
    ctx.font = '32px serif';
    ctx.fillText(activeBtn.dataset.emoji, W / 2 - 50, moodY);
    ctx.fillStyle = '#c490d1';
    ctx.font = `500 18px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.fillText(`今天心情  ${activeBtn.dataset.mood}`, W / 2 + 16, moodY - 4);
  }

  // 底部日期
  ctx.fillStyle = '#d4b0e0';
  ctx.font = `400 14px "PingFang SC","Microsoft YaHei",sans-serif`;
  ctx.fillText(dateStr + '  🐾', W / 2, cy + ch - 44);

  // 下载
  const a = document.createElement('a');
  a.download = `刘迎春_${dateStr}.png`;
  a.href = cv.toDataURL('image/png');
  a.click();
}

// Confetti — pastel palette
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let particles = [];
const pastelColors = [
  '#ffb3d9','#d4b3ff','#b3d9ff','#b3ffda','#ffe5b3','#ffb3b3','#e0b3ff'
];

function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10,
      r: Math.random() * 7 + 3,
      color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
      speed: Math.random() * 3.5 + 1.5,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 4,
      drift: (Math.random() - 0.5) * 1.5,
      shape: Math.random() > 0.4 ? 'circle' : 'heart',
    });
  }
  if (!animating) { animating = true; requestAnimationFrame(animateConfetti); }
}

let animating = false;

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.y < canvas.height + 20);
  particles.forEach(p => {
    p.y += p.speed;
    p.x += p.drift;
    p.angle += p.spin;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle * Math.PI / 180);
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.r / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // simple small square as "heart" stand-in
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r);
    }
    ctx.restore();
  });
  if (particles.length > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    animating = false;
  }
}

// 心情
async function setMood(btn) {
  const mood = btn.dataset.mood;
  const emoji = btn.dataset.emoji;

  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateSideMood(emoji, mood);

  const status = document.getElementById('moodStatus');
  status.textContent = '记录中……';

  try {
    await fetch('/api/mood', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mood, emoji }),
    });
    status.textContent = `已记录：${emoji} ${mood}，谢谢你告诉我 🐾`;
  } catch {
    status.textContent = '记录失败，待会儿再试试';
  }
}

async function loadTodayMood() {
  try {
    const res = await fetch('/api/mood');
    const moods = await res.json();
    const today = new Date(Date.now() + 8 * 60 * 60 * 1000).toISOString().slice(0, 10);
    const todayMood = moods.find(m => m.date === today);
    if (todayMood) {
      const btn = document.querySelector(`.mood-btn[data-mood="${todayMood.mood}"]`);
      if (btn) btn.classList.add('active');
      document.getElementById('moodStatus').textContent = `今天已记录：${todayMood.emoji} ${todayMood.mood} 🐾`;
      updateSideMood(todayMood.emoji, todayMood.mood);
    }
  } catch {}
}

loadTodayMood();

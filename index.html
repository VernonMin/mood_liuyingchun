<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘迎春专属夸夸机</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #ffe4f0 0%, #f5e6ff 50%, #dff2ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  @media (max-width: 780px) {
    body {
      justify-content: flex-start;
      padding: 24px 0 40px;
    }
  }

  /* 欢迎屏 */
  #splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg, #ffe4f0 0%, #f5e6ff 50%, #dff2ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.8s ease;
    cursor: pointer;
  }

  #splash.hide {
    opacity: 0;
    pointer-events: none;
  }

  .splash-dog {
    font-size: 80px;
    display: block;
    animation: splashDog 0.8s ease-out both;
  }

  @keyframes splashDog {
    0%   { transform: scale(0.3) rotate(-20deg); opacity: 0; }
    70%  { transform: scale(1.15) rotate(5deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .splash-line {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    text-align: center;
  }

  .splash-line.show {
    opacity: 1;
    transform: translateY(0);
  }

  .splash-greeting {
    font-size: 22px;
    color: #d966a0;
    font-weight: 700;
    letter-spacing: 3px;
    margin: 24px 0 12px;
  }

  .splash-sub {
    font-size: 14px;
    color: #c490d1;
    letter-spacing: 2px;
  }

  .splash-hint {
    position: absolute;
    bottom: 48px;
    font-size: 12px;
    color: #dbbfee;
    letter-spacing: 1px;
    opacity: 0;
    animation: fadeHint 1s ease 1.8s forwards;
  }

  @keyframes fadeHint {
    to { opacity: 1; }
  }

  /* 主内容入场 */
  #main {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  #main.show {
    opacity: 1;
    transform: translateY(0);
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* 背景浮动爪印 */
  .paws {
    position: fixed;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .paw {
    position: absolute;
    font-size: 20px;
    opacity: 0.15;
    animation: sway 4s infinite alternate ease-in-out;
  }

  @keyframes sway {
    0%   { transform: translateY(0) rotate(-10deg); opacity: 0.1; }
    100% { transform: translateY(-12px) rotate(10deg); opacity: 0.22; }
  }

  /* 主卡片 */
  .machine {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border-radius: 36px;
    padding: 48px 40px 40px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(220,150,200,0.2), 0 2px 12px rgba(180,130,220,0.12);
    border: 2px solid rgba(255,200,230,0.6);
    max-width: 580px;
    width: 90%;
    position: relative;
    z-index: 10;
  }

  /* 小狗 */
  .dog {
    font-size: 64px;
    display: inline-block;
    animation: dogWag 0.8s infinite alternate ease-in-out;
    transform-origin: bottom center;
  }

  @keyframes dogWag {
    0%   { transform: rotate(-8deg); }
    100% { transform: rotate(8deg); }
  }

  h1 {
    font-size: 24px;
    color: #d966a0;
    margin: 14px 0 6px;
    font-weight: 800;
    letter-spacing: 3px;
  }

  .subtitle {
    color: #c9a8d4;
    font-size: 12px;
    margin-bottom: 28px;
    letter-spacing: 1px;
  }

  /* 语录框 */
  .quote-box {
    background: linear-gradient(135deg, #fff0f8, #f4eeff);
    border-radius: 24px;
    padding: 28px 24px;
    min-height: 108px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 26px;
    border: 2px solid #f5c6e8;
    position: relative;
  }

  .paw-deco {
    position: absolute;
    font-size: 36px;
    opacity: 0.08;
    top: 6px; right: 10px;
    pointer-events: none;
  }

  .quote-text {
    font-size: 17px;
    color: #5a4060;
    line-height: 1.9;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px) scale(0.98);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .quote-text.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* 按钮 */
  .btn {
    background: linear-gradient(135deg, #f472b6, #c084fc);
    color: white;
    border: none;
    padding: 16px 52px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 6px 20px rgba(196,100,210,0.35);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .btn:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 28px rgba(196,100,210,0.45);
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.25);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.5s, height 0.5s;
  }

  .btn:active::after {
    width: 320px; height: 320px;
  }

  /* 计数 */
  .counter {
    margin-top: 18px;
    color: #d4b0e0;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .counter span {
    color: #d966a0;
    font-weight: bold;
    font-size: 16px;
  }

  /* 左侧面板 */
  .side-panel {
    position: fixed;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 22px 16px;
    border: 2px solid rgba(255,200,230,0.6);
    box-shadow: 0 4px 24px rgba(220,150,200,0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    z-index: 10;
    min-width: 76px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .side-panel.show { opacity: 1; }

  .side-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .side-big-emoji { font-size: 26px; }

  .side-val {
    font-size: 28px;
    font-weight: 800;
    color: #d966a0;
    line-height: 1;
    transition: transform 0.15s ease;
  }

  .side-val.bump {
    transform: scale(1.35);
  }

  .side-label {
    font-size: 10px;
    color: #d4b0e0;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .side-divider {
    width: 32px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #f5c6e8, transparent);
    border-radius: 2px;
  }

  .side-mood-emoji {
    font-size: 28px;
    transition: transform 0.3s ease;
  }

  .side-mood-emoji.pop { transform: scale(1.4); }

  /* 右侧历史面板 */
  .history-panel {
    position: fixed;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 20px 16px;
    border: 2px solid rgba(255,200,230,0.6);
    box-shadow: 0 4px 24px rgba(220,150,200,0.18);
    z-index: 10;
    width: 130px;
    max-height: 70vh;
    overflow-y: auto;
    opacity: 0;
    transition: opacity 0.6s ease;
    scrollbar-width: none;
  }

  .history-panel::-webkit-scrollbar { display: none; }
  .history-panel.show { opacity: 1; }

  .history-title {
    font-size: 10px;
    color: #d4b0e0;
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 12px;
  }

  .history-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(245,198,232,0.4);
  }

  .history-item:last-child { border-bottom: none; }

  .history-emoji { font-size: 22px; }

  .history-mood {
    font-size: 11px;
    color: #7a5090;
    font-weight: 600;
  }

  .history-date {
    font-size: 10px;
    color: #d4b0e0;
    white-space: nowrap;
  }

  .history-count {
    font-size: 10px;
    color: #d966a0;
  }

  .history-empty {
    font-size: 11px;
    color: #d4b0e0;
    text-align: center;
    line-height: 1.8;
    padding: 8px 0;
  }

  /* 手机内嵌历史 */
  .mobile-history {
    display: none;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1.5px dashed #f5d0ee;
  }

  .mobile-history-title {
    font-size: 12px;
    color: #d4b0e0;
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-align: center;
  }

  .mobile-history-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .mobile-history-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: #fff0f8;
    border-radius: 12px;
    padding: 8px 4px;
    border: 1.5px solid #f5c6e8;
  }

  .mobile-history-emoji { font-size: 20px; }
  .mobile-history-mood { font-size: 10px; color: #7a5090; font-weight: 600; }
  .mobile-history-date { font-size: 9px; color: #d4b0e0; }

  @media (max-width: 780px) {
    .side-panel { display: none; }
    .history-panel { display: none; }
    .mobile-history { display: block; }
  }

  .greeting {
    font-size: 14px;
    color: #c490d1;
    margin-bottom: 16px;
    letter-spacing: 1px;
    min-height: 20px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .greeting.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* 心情 */
  .mood-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1.5px dashed #f5d0ee;
  }

  .mood-label {
    font-size: 13px;
    color: #c490d1;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .mood-options {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .mood-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: #fff0f8;
    border: 2px solid #f5c6e8;
    border-radius: 16px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 62px;
  }

  .mood-btn:hover { transform: translateY(-2px); border-color: #d966a0; }

  .mood-btn.active {
    background: linear-gradient(135deg, #ffe4f5, #f0e0ff);
    border-color: #d966a0;
    box-shadow: 0 4px 14px rgba(217,102,160,0.25);
    transform: translateY(-2px);
  }

  .mood-emoji { font-size: 24px; }

  .mood-text {
    font-size: 11px;
    color: #b080c0;
    letter-spacing: 0.5px;
  }

  .mood-status {
    font-size: 12px;
    color: #d4b0e0;
    margin-top: 10px;
    min-height: 18px;
    transition: opacity 0.3s;
  }

  /* 分享按钮 */
  .share-row {
    display: flex;
    justify-content: center;
    margin-top: 14px;
  }

  .share-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.7);
    border: 1.5px solid #f5c6e8;
    border-radius: 50px;
    padding: 8px 22px;
    font-size: 13px;
    color: #c490d1;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s ease;
    opacity: 0;
    pointer-events: none;
  }

  .share-btn.ready {
    opacity: 1;
    pointer-events: auto;
  }

  .share-btn:hover {
    background: linear-gradient(135deg, #ffe4f5, #f0e0ff);
    border-color: #d966a0;
    color: #d966a0;
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(217,102,160,0.2);
  }

  .share-btn:active { transform: scale(0.96); }

  /* 预览弹窗 */
  .preview-mask {
    position: fixed;
    inset: 0;
    background: rgba(60,30,70,0.55);
    backdrop-filter: blur(6px);
    z-index: 8000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .preview-mask.show {
    opacity: 1;
    pointer-events: auto;
  }

  .preview-img {
    max-width: 340px;
    width: 100%;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: block;
    transform: translateY(16px);
    transition: transform 0.35s ease;
  }

  .preview-mask.show .preview-img {
    transform: translateY(0);
  }

  .preview-hint {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-top: 14px;
    letter-spacing: 1px;
  }

  .preview-actions {
    display: flex;
    gap: 12px;
    margin-top: 12px;
  }

  .preview-dl-btn {
    background: linear-gradient(135deg, #f472b6, #c084fc);
    color: white;
    border: none;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 6px 20px rgba(196,100,210,0.4);
    transition: all 0.2s;
  }

  .preview-dl-btn:hover { transform: translateY(-2px); }

  .preview-close-btn {
    background: rgba(255,255,255,0.2);
    color: white;
    border: 1.5px solid rgba(255,255,255,0.4);
    padding: 12px 24px;
    font-size: 14px;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .preview-close-btn:hover { background: rgba(255,255,255,0.3); }

  /* 浮动 emoji */
  .floating-emoji {
    position: fixed;
    font-size: 26px;
    pointer-events: none;
    animation: floatUp 2.8s ease-out forwards;
    z-index: 100;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-180px) scale(0.4) rotate(25deg); }
  }
</style>
</head>
<body>

<!-- 欢迎屏 -->
<div id="splash" onclick="dismissSplash()">
  <span class="splash-dog">🐶</span>
  <p class="splash-line splash-greeting" id="splashGreeting"></p>
  <p class="splash-line splash-sub" id="splashSub"></p>
  <span class="splash-hint">轻触任意处进入 🐾</span>
</div>

<!-- 左侧面板 -->
<div class="side-panel" id="sidePanel">
  <div class="side-item">
    <span class="side-big-emoji">🐾</span>
    <div class="side-val" id="sideCount">0</div>
    <div class="side-label">今日被夸</div>
  </div>
  <div class="side-divider"></div>
  <div class="side-item">
    <span class="side-mood-emoji" id="sideMoodEmoji">🌸</span>
    <div class="side-label" id="sideMoodLabel">今日心情</div>
  </div>
</div>

<!-- 右侧历史面板 -->
<div class="history-panel" id="historyPanel">
  <div class="history-title">刘迎春的历史心情</div>
  <div id="historyList"><div class="history-empty">加载中…</div></div>
</div>

<div class="paws" id="paws"></div>
<canvas id="confetti"></canvas>

<div id="main">
<div class="machine">
  <div class="dog">🐶</div>
  <h1>刘迎春专属夸夸机</h1>

  <p class="greeting" id="greeting"></p>

  <div class="quote-box">
    <span class="paw-deco">🐾</span>
    <div class="quote-text" id="quote">点下面的按钮试试看 🐾</div>
  </div>

  <button class="btn" onclick="praise()">夸 我 ！</button>

  <div class="share-row">
    <button class="share-btn" id="shareBtn" onclick="doShare()">
      <span>🖼</span><span>保存分享</span>
    </button>
  </div>

  <div class="counter">
    <p>今天已被夸了 <span id="count">0</span> 次 🐾</p>
  </div>

  <div class="mood-section">
    <p class="mood-label">今天怎么样？</p>
    <div class="mood-options" id="moodOptions">
      <button class="mood-btn" data-mood="很好" data-emoji="😊" onclick="setMood(this)">
        <span class="mood-emoji">😊</span>
        <span class="mood-text">很好</span>
      </button>
      <button class="mood-btn" data-mood="还行" data-emoji="🙂" onclick="setMood(this)">
        <span class="mood-emoji">🙂</span>
        <span class="mood-text">还行</span>
      </button>
      <button class="mood-btn" data-mood="有点累" data-emoji="😴" onclick="setMood(this)">
        <span class="mood-emoji">😴</span>
        <span class="mood-text">有点累</span>
      </button>
      <button class="mood-btn" data-mood="不太好" data-emoji="😔" onclick="setMood(this)">
        <span class="mood-emoji">😔</span>
        <span class="mood-text">不太好</span>
      </button>
    </div>
    <p class="mood-status" id="moodStatus"></p>
  </div>

  <!-- 手机端历史心情 -->
  <div class="mobile-history">
    <p class="mobile-history-title">刘迎春的历史心情</p>
    <div class="mobile-history-grid" id="mobileHistoryList"></div>
  </div>
</div>
</div>

<div class="preview-mask" id="previewMask" onclick="closePreview(event)">
  <img class="preview-img" id="previewImg" src="" alt="预览" />
  <p class="preview-hint">长按图片保存到相册</p>
  <div class="preview-actions">
    <button class="preview-close-btn" onclick="closePreview()">关闭</button>
  </div>
</div>

<script>
const quotes = [
  "刘迎春今天也在好好的，这件事本身，就已经很好了。",
  "认识刘迎春，是一件很幸运的事。",
  "刘迎春这个名字，念出来就觉得很软。",
  "刘迎春身边的人，都会不自觉地比平时更温柔一些。",
  "有她在的地方，气氛会轻一点，也会暖一点。",
  "今天又过了一天，不管怎么样，都算数。",
  "不需要做什么，光是在，就已经很好了。",
  "她说话的时候，让人觉得被认真听到了。",
  "刘迎春很好，比她自己以为的还要好很多。",
  "随手做的一件小事，也带着只有她才有的那种感觉。",
  "今天有没有开心一下？希望有，哪怕一点点。",
  "刘迎春身上有一种温柔，不用说出来，待着就能感觉到。",
  "今天也认真地活着，这件事，悄悄地了不起。",
  "累了就好好休息。",
  "有没有好好吃饭？记得吃饭。",
  "和她在一起的时间，回想起来都是轻的。",
  "今天也好好的，这就是今天最好的消息。",
  "有她在，好像什么事情都会变得没那么难。",
  "谢谢你今天也在，刘迎春。",
  "如果春天是一个人，大概就是她的样子。",
  "今天也被好好对待了吗？应该的。",
];

const emojis = ['🐶','🐾','🌸','✨','💕','🍡','🌷','💫','🎀','🍓'];
let lastIndex = -1;

function getBeijingDate() {
  const beijing = new Date(Date.now() + 8 * 60 * 60 * 1000);
  return beijing.toISOString().slice(0, 10);
}

let count = 0;

function setCount(n) {
  count = n;
  document.getElementById('count').textContent = n;
  updateSideCount(n);
}

async function initCount() {
  try {
    const res = await fetch('/api/count');
    const data = await res.json();
    setCount(data.count);
  } catch {
    // 离线降级：读 localStorage
    const saved = JSON.parse(localStorage.getItem('lyc_praise') || '{}');
    if (saved.date === getBeijingDate()) setCount(saved.count || 0);
  }
}

async function incrementCount() {
  // 乐观更新，立刻显示

    setCount(data.count); // 以服务器为准
  } catch {
    // 离线时本地缓存
    localStorage.setItem('lyc_praise', JSON.stringify({ date: getBeijingDate(), count }));
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function wrapText(ctx, text, x, maxWidth, lineHeight) {
  const chars = text.split('');
  let line = '';
  const lines = [];
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = ch;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function getBeijingDateStr() {
  const d = new Date(Date.now() + 8 * 60 * 60 * 1000);
  return `${d.getUTCFullYear()}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${String(d.getUTCDate()).padStart(2,'0')}`;
}

let _currentDataUrl = '';

function drawCard() {
  const quote = document.getElementById('quote').textContent;
  const activeBtn = document.querySelector('.mood-btn.active');
  const dateStr = getBeijingDateStr();

  const W = 750, H = 1080;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');

  // 背景
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#ffe0ee');
  bg.addColorStop(0.55, '#efe0ff');
  bg.addColorStop(1, '#d8eeff');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 背景散点（柔和）
  ctx.globalAlpha = 0.06;
  ctx.font = '36px serif';
  [[60,90],[680,80],[40,520],[700,480],[360,30],[100,960],[640,920],[380,1040]].forEach(([x,y]) => {
    ctx.fillText('🐾', x, y);
  });
  ctx.globalAlpha = 1;

  // 卡片阴影（模拟）
  ctx.shadowColor = 'rgba(180,100,180,0.18)';
  ctx.shadowBlur = 60;
  ctx.shadowOffsetY = 16;

  // 白色卡片
  const cx = 52, cy = 90, cw = W - 104, ch = H - 180;
  roundRect(ctx, cx, cy, cw, ch, 40);
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fill();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // 卡片顶部粉色装饰条
  roundRect(ctx, cx, cy, cw, 170, 40);
  const headerGrad = ctx.createLinearGradient(cx, cy, cx + cw, cy + 170);
  headerGrad.addColorStop(0, '#ffd6eb');
  headerGrad.addColorStop(1, '#ecdeff');
  ctx.fillStyle = headerGrad;
  ctx.fill();

  // 遮住底部圆角（让装饰条底部是直的）
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fillRect(cx, cy + 130, cw, 40);

  // 🐶
  ctx.textAlign = 'center';
  ctx.font = '62px serif';
  ctx.fillText('🐶', W / 2, cy + 92);

  // 标题
  ctx.fillStyle = '#d45c96';
  ctx.font = `700 22px “PingFang SC”,”Microsoft YaHei”,sans-serif`;
  ctx.fillText('刘迎春专属夸夸机', W / 2, cy + 146);

  // 分隔线（渐变）
  const divY = cy + 178;
  const divGrad = ctx.createLinearGradient(cx + 80, 0, cx + cw - 80, 0);
  divGrad.addColorStop(0, 'transparent');
  divGrad.addColorStop(0.4, '#f0b8d8');
  divGrad.addColorStop(0.6, '#d8b0f0');
  divGrad.addColorStop(1, 'transparent');
  ctx.strokeStyle = divGrad;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx + 80, divY);
  ctx.lineTo(cx + cw - 80, divY);
  ctx.stroke();

  // 大引号装饰
  ctx.fillStyle = '#f0c0e0';
  ctx.globalAlpha = 0.35;
  ctx.font = `120px Georgia,serif`;
  ctx.fillText('“', cx + 44, cy + 290);
  ctx.globalAlpha = 1;

  // 文案正文（自动换行，居中）
  const font = `500 28px “PingFang SC”,”Microsoft YaHei”,sans-serif`;
  ctx.font = font;
  ctx.fillStyle = '#4a3060';
  const textMaxW = cw - 120;
  const lines = wrapText(ctx, quote, W / 2, textMaxW, 44);
  const lineH = 46;
  const blockH = lines.length * lineH;
  const quoteZoneTop = cy + 230;
  const quoteZoneH = ch - 310;
  const textY = quoteZoneTop + (quoteZoneH - blockH) / 2;
  lines.forEach((l, i) => ctx.fillText(l, W / 2, textY + i * lineH));

  // 心情 badge
  if (activeBtn) {
    const badgeY = cy + ch - 130;
    roundRect(ctx, W/2 - 100, badgeY - 32, 200, 48, 24);
    ctx.fillStyle = 'rgba(245,198,232,0.35)';
    ctx.fill();
    ctx.font = '26px serif';
    ctx.fillText(activeBtn.dataset.emoji, W / 2 - 36, badgeY + 4);
    ctx.fillStyle = '#b060b0';
    ctx.font = `500 18px “PingFang SC”,”Microsoft YaHei”,sans-serif`;
    ctx.fillText(activeBtn.dataset.mood, W / 2 + 26, badgeY + 4);
  }

  // 底部日期
  ctx.fillStyle = '#cca8dc';
  ctx.font = `400 15px “PingFang SC”,”Microsoft YaHei”,sans-serif`;
  ctx.fillText(dateStr, W / 2, cy + ch - 54);

  // 底部小爪印
  ctx.font = '18px serif';
  ctx.globalAlpha = 0.2;
  ctx.fillText('🐾', W / 2, cy + ch - 28);
  ctx.globalAlpha = 1;

  return cv.toDataURL('image/png');
}

function closePreview(e) {

  document.getElementById('previewMask').classList.remove('show');
}

async function downloadImage(e) {
  e.stopPropagation();
  const filename = `刘迎春_${getBeijingDateStr()}.png`;

  // 手机端：用系统分享（包含保存到相册选项）
  if (navigator.canShare) {
    try {
      const blob = await (await fetch(_currentDataUrl)).blob();
      const file = new File([blob], filename, { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file] });
        return;
      }
    } catch {}
  }

  // 桌面端降级：直接下载
  const a = document.createElement('a');
  a.download = filename;
  a.href = _currentDataUrl;
  a.click();
}

function spawnEmojis() {
  const btn = document.querySelector('.btn');
  const rect = btn.getBoundingClientRect();
  for (let i = 0; i < 7; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'floating-emoji';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (rect.left + Math.random() * rect.width) + 'px';
      el.style.top = (rect.top - 10) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 70);
  }
}

// Confetti — pastel palette
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let particles = [];
const pastelColors = [
  '#ffb3d9','#d4b3ff','#b3d9ff','#b3ffda','#ffe5b3','#ffb3b3','#e0b3ff'
];

function launchConfetti() {
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -10,
      r: Math.random() * 7 + 3,
      color: pastelColors[Math.floor(Math.random() * pastelColors.length)],
      speed: Math.random() * 3.5 + 1.5,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 4,
      drift: (Math.random() - 0.5) * 1.5,
      shape: Math.random() > 0.4 ? 'circle' : 'heart',
    });
  }
  if (!animating) { animating = true; requestAnimationFrame(animateConfetti); }
}

let animating = false;

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.y < canvas.height + 20);
  particles.forEach(p => {
    p.y += p.speed;
    p.x += p.drift;
    p.angle += p.spin;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle * Math.PI / 180);
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, p.r / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // simple small square as "heart" stand-in
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r);
    }
    ctx.restore();
  });
  if (particles.length > 0) {
    requestAnimationFrame(animateConfetti);
  } else {
    animating = false;
  }
}

// 心情
async function setMood(btn) {
  const mood = btn.dataset.mood;
  const emoji = btn.dataset.emoji;

  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateSideMood(emoji, mood);

  const status = document.getElementById('moodStatus');
  status.textContent = '记录中……';

  try {
    await fetch('/api/mood', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mood, emoji }),
    });
    status.textContent = `已记录：${emoji} ${mood}，谢谢你告诉我 🐾`;
    // 刷新右侧历史
    const res = await fetch('/api/mood');
    renderHistory(await res.json());
  } catch {
    status.textContent = '记录失败，待会儿再试试';
  }
}

async function loadTodayMood() {
  try {
    const res = await fetch('/api/mood');
    const moods = await res.json();
    const today = new Date(Date.now() + 8 * 60 * 60 * 1000).toISOString().slice(0, 10);
    const todayMood = moods.find(m => m.date === today);
    if (todayMood) {
      const btn = document.querySelector(`.mood-btn[data-mood="${todayMood.mood}"]`);
      if (btn) btn.classList.add('active');
      document.getElementById('moodStatus').textContent = `今天已记录：${todayMood.emoji} ${todayMood.mood} 🐾`;
      updateSideMood(todayMood.emoji, todayMood.mood);
    }
    renderHistory(moods);
  } catch {
    document.getElementById('historyList').innerHTML = '<div class="history-empty">暂无记录</div>';
  }
}

function renderHistory(moods) {
  // 桌面端右侧面板
  const list = document.getElementById('historyList');
  if (!moods.length) {
    list.innerHTML = '<div class="history-empty">还没有记录 🐾</div>';
    document.getElementById('mobileHistoryList').innerHTML = '';
    return;
  }
  list.innerHTML = moods.slice(0, 60).map(m => `
    <div class="history-item">
      <span class="history-emoji">${m.emoji || '🙂'}</span>
      <span class="history-mood">${m.mood}</span>
      <span class="history-date">${m.date.slice(5)}</span>
    </div>
  `).join('');

  // 手机端网格
  document.getElementById('mobileHistoryList').innerHTML = moods.slice(0, 60).map(m => `
    <div class="mobile-history-item">
      <span class="mobile-history-emoji">${m.emoji || '🙂'}</span>
      <span class="mobile-history-mood">${m.mood}</span>
      <span class="mobile-history-date">${m.date.slice(5)}</span>
    </div>
  `).join('');
}

loadTodayMood();
